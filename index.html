<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스킬 옵션 표</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,"Noto Sans KR",sans-serif;
    background:#fff;
    color:#344e68;
}

.table-container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#263f58;
}

.table-scroll{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:780px;
}

th{
    background:#eaf3fb;
    color:#263f58;
    padding:12px;
    border:1px solid #c9d8e7;
    font-size:15px;
}

td{
    padding:10px 12px;
    border:1px solid #d9e4ef;
    font-size:14px;
}

tbody tr:nth-child(even){
    background:#fafcff;
}

tbody tr:hover{
    background:#eef6ff;
}

/* 캐릭터 */
td.character{
    width:90px;
    text-align:center;
    font-weight:bold;
    color:#2f5d8c;
    vertical-align:middle;
}

/* 옵션 */
td.option{
    width:auto;
}

/* 수치 */
td.value{
    width:80px;
    text-align:center;
    font-weight:bold;
    color:#d97706;
}
</style>

</head>
<body>

<div class="table-container">

<h1>스킬 옵션 표</h1>

<div class="table-scroll">

<table>

<thead>
<tr>
<th>아르카나</th>
<th>옵션</th>
<th>수치</th>
</tr>
</thead>

<tbody>

<tr>
<td class="character" rowspan="4">엘나</td>
<td class="option">파이어 리프 어택 데미지 배율 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="option">아이스 윈드밀 데미지 배율 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="option">라이트닝 스매시 데미지 배율 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="option">라인 브레이크 데미지 배율 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="character" rowspan="4">세바</td>
<td class="option">활력의 목소리 초당 생명력 회복량 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="option">구원의 메아리 데미지 배율 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="option">정화의 고동 초당 데미지 증가</td>
<td class="value">10</td>
</tr>

<tr>
<td class="option">음파의 세례 데미지 배율 증가</td>
<td class="value">10</td>
</tr>

</tbody>

</table>

</div>
</div>

</body>
</html>
